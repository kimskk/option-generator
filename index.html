<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>공구 옵션이미지 제작 BETA</title>
  <style>
    :root{
      --black:#181818;
      --line:#e6e7eb;
      --grid:#eceef2;
      --muted:#8a8f98;
      --bg:#f5f6f8;
      --white:#fff;
      --panel:#fff;
      --soft:#f2f3f5;
      --blue:#168BFF;
      --point:#FF692E;
      --point-soft:#fff0e9;
      --shadow:0 16px 38px rgba(16,17,20,.06);
      --shadow-soft:0 8px 18px rgba(16,17,20,.045);
      --radius:18px;
    }

    *{box-sizing:border-box}
    html{background:var(--bg)}
    body{
      margin:0;
      background:var(--bg);
      font-family:Arial,'Pretendard','Noto Sans KR',sans-serif;
      color:#181818;
      overflow-x:auto;
      -webkit-font-smoothing:antialiased;
    }

    .app{
      width:100%;
      min-width:1360px;
      max-width:none;
      margin:0 auto;
      min-height:100vh;
      background:transparent;
      padding:18px 22px 36px;
    }

    .top{
      height:104px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 32px;
      border:1px solid var(--line);
      border-radius:10px 10px 0 0;
      background:#fff;
      box-shadow:var(--shadow-soft);
    }

    .brand{
      position:relative;
      font-weight:900;
      font-size:30px;
      letter-spacing:-.055em;
      display:flex;
      align-items:center;
      gap:10px;
      line-height:1;
    }
    .brand-logo{
      width:42px;
      height:42px;
      object-fit:contain;
      display:block;
      flex:0 0 auto;
      margin-right:10px;
    }
    .brand small{
      font-size:12px;
      margin-top:0;
      padding:5px 9px;
      border-radius:999px;
      background:var(--point-soft);
      color:var(--point);
      letter-spacing:.02em;
      border:1px solid rgba(255,105,46,.18);
    }

    .btn{
      border:0;
      border-radius:12px;
      background:var(--point);
      color:#fff;
      font-weight:900;
      font-size:18px;
      padding:15px 24px;
      cursor:pointer;
      box-shadow:0 14px 24px rgba(255,105,46,.22);
      transition:transform .12s ease, filter .12s ease, box-shadow .12s ease;
    }
    .btn:hover{filter:brightness(.98);box-shadow:0 16px 28px rgba(255,105,46,.28)}
    .btn:active{transform:translateY(1px)}

    .tabs{
      height:64px;
      border-left:1px solid var(--line);
      border-right:1px solid var(--line);
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      padding:0 28px;
      gap:12px;
      background:#fff;
    }
    .tab{
      position:relative;
      font-weight:900;
      font-size:16px;
      padding:13px 22px;
      border:1px solid transparent;
      border-radius:999px;
      cursor:pointer;
      color:#5e5b55;
      white-space:nowrap;
      transition:background .14s ease, color .14s ease, box-shadow .14s ease, border-color .14s ease;
    }
    .tab:hover{background:transparent;border-color:transparent;color:#1b1b1b}
    .tab.active{
      background:transparent;
      color:var(--point);
      border-color:transparent;
      box-shadow:none;
      font-weight:950;
    }
    .tab.active:after{
      content:'';
      position:absolute;
      left:22px;
      right:22px;
      bottom:6px;
      height:3px;
      border-radius:999px;
      background:var(--point);
    }

    .toolbar{
      min-height:68px;
      display:flex;
      align-items:center;
      gap:10px;
      padding:12px 32px;
      border-left:1px solid var(--line);
      border-right:1px solid var(--line);
      border-bottom:1px solid var(--line);
      border-radius:0 0 10px 10px;
      background:#fff;
      box-shadow:var(--shadow-soft);
      overflow-x:auto;
    }

    .mini{
      height:40px;
      min-width:90px;
      flex:0 0 auto;
      border:1px solid #e1e3e8;
      background:#fff;
      border-radius:12px;
      padding:0 15px;
      font-weight:900;
      font-size:13px;
      color:#252525;
      cursor:pointer;
      white-space:nowrap;
      line-height:40px;
      box-shadow:0 8px 18px rgba(16,17,20,.04);
      transition:transform .12s ease, border-color .12s ease, color .12s ease, background .12s ease, box-shadow .12s ease;
    }
    .mini:hover{
      border-color:var(--point);
      color:var(--point);
      background:#fff;
      box-shadow:0 10px 20px rgba(16,17,20,.06);
    }
    .mini:active{transform:translateY(1px)}
    .hint{
      font-size:13px;
      color:#8b867e;
      margin-left:8px;
      white-space:nowrap;
      flex:0 0 auto;
    }
    #deleteRowBtn{min-width:120px}
    #clearAllBtn{min-width:96px}
    #clearBtn{min-width:98px}
    #dbUpdateBtn{min-width:98px}
    .mini.update-action{
      background:var(--point);
      border-color:var(--point);
      color:#fff;
      box-shadow:0 12px 22px rgba(255,105,46,.22);
    }
    .mini.update-action:hover{filter:brightness(.97);color:#fff;background:var(--point)}

    .sheet-wrap{
      margin:22px 0 0;
      background:#fff;
      border:1px solid var(--line);
      border-radius:var(--radius);
      overflow:hidden;
      box-shadow:var(--shadow);
    }
    .sheet-scroll{
      overflow:auto;
      scrollbar-color:#cfd3da transparent;
      scrollbar-width:thin;
    }
    .sheet-scroll::-webkit-scrollbar{height:10px;width:10px}
    .sheet-scroll::-webkit-scrollbar-thumb{background:#cfd3da;border-radius:999px;border:2px solid #fff}
    .sheet-scroll::-webkit-scrollbar-track{background:transparent}

    .sheet{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      table-layout:fixed;
      background:#fff;
    }
    .sheet th,.sheet td{
      border-bottom:1px solid var(--grid);
      border-right:1px solid rgba(238,232,223,.65);
      min-height:46px;
      height:46px;
      text-align:center;
      vertical-align:middle;
      padding:0 12px;
      white-space:nowrap;
    }
    .sheet th:last-child,.sheet td:last-child{border-right:0}
    #optionsTable{min-width:1840px}
    #dbTable{min-width:1160px}
    #rulesTable{min-width:920px}

    .sheet th.select-col,.sheet td.select-col{
      width:48px;
      padding:0;
      position:sticky;
      left:0;
      z-index:3;
      background:#fff;
      box-shadow:1px 0 0 rgba(238,232,223,.9);
      user-select:none;
      -webkit-user-select:none;
    }
    .sheet th.select-col{
      z-index:5;
      background:#f7f8fa;
    }
    .sheet tbody tr:hover td.select-col{background:#f7f8fa}
    .row-check,.head-check{
      width:16px;
      height:16px;
      accent-color:var(--point);
      cursor:pointer;
      user-select:none;
    }
    .sheet .select-col{user-select:none}
    .sheet th{
      position:sticky;
      top:0;
      z-index:1;
      font-size:14px;
      font-weight:900;
      background:#f7f8fa;
      color:#202020;
      border-bottom:1px solid #dfe2e7;
    }
    .sheet td{
      font-size:15px;
      color:#171717;
      background:#fff;
    }
    .sheet tbody tr:hover td{background:#f7f8fa}
    .sheet td[contenteditable="true"]{outline:none}
    .sheet td[contenteditable="true"]:focus{
      background:#f7f8fa;
      box-shadow:inset 0 0 0 2px #cfd3da;
    }

    #optionsTable th:nth-child(10),#optionsTable td:nth-child(10){min-width:360px}
    #optionsTable th:nth-child(11),#optionsTable td:nth-child(11){min-width:520px}
    #optionsTable td:nth-child(10),#optionsTable td:nth-child(11){
      white-space:normal;
      text-align:left;
      line-height:1.42;
      word-break:break-word;
      overflow-wrap:anywhere;
      padding-top:9px;
      padding-bottom:9px;
      height:auto;
      min-height:46px;
    }
    #rulesTable td:nth-child(4){
      white-space:normal;
      text-align:left;
      line-height:1.42;
      word-break:break-word;
      overflow-wrap:anywhere;
      padding-top:9px;
      padding-bottom:9px;
      height:auto;
      min-height:46px;
    }


    .table-actions{
      min-height:72px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      border-top:1px solid var(--line);
      background:#fff;
      padding:14px;
    }
    .table-row-action{
      min-width:116px;
      height:42px;
      border:1px solid #dfe2e7;
      border-radius:12px;
      background:#fff;
      color:#222;
      font-weight:900;
      font-size:14px;
      cursor:pointer;
      line-height:40px;
      box-shadow:0 8px 18px rgba(16,17,20,.04);
      transition:transform .12s ease, border-color .12s ease, color .12s ease, background .12s ease, box-shadow .12s ease;
    }
    .table-row-action:hover{
      border-color:var(--point);
      color:var(--point);
      box-shadow:0 10px 20px rgba(16,17,20,.06);
    }
    .table-row-action:active{transform:translateY(1px)}
    .table-row-action.primary{
      background:var(--point);
      border-color:var(--point);
      color:#fff;
      box-shadow:0 12px 22px rgba(255,105,46,.18);
    }
    .table-row-action.primary:hover{color:#fff;filter:brightness(.97)}

    .pagination{
      height:62px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:7px;
      border-top:1px solid var(--line);
      background:#fff;
    }
    .page-btn{
      min-width:34px;
      height:34px;
      border:1px solid #dfe2e7;
      background:#fff;
      border-radius:10px;
      font-weight:900;
      color:#302e2a;
      cursor:pointer;
      box-shadow:0 5px 12px rgba(16,17,20,.035);
    }
    .page-btn.active{
      background:var(--point);
      color:#fff;
      border-color:var(--point);
      box-shadow:0 8px 16px rgba(255,105,46,.20);
    }
    .page-btn:disabled{opacity:.35;cursor:default}
    .hidden{display:none!important}

    .results{
      margin:22px 0 20px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:24px;
      box-shadow:var(--shadow);
    }
    .results-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:18px;
    }
    .results-title{font-weight:900;font-size:20px;letter-spacing:-.02em}
    .cards{
      min-height:360px;
      border:1px dashed #d7dbe2;
      border-radius:16px;
      padding:24px;
      display:flex;
      flex-wrap:wrap;
      gap:24px;
      background:#fafbfc;
    }
    .cards:empty:before{
      content:'이미지 생성 버튼을 누르면 결과가 여기에 표시됩니다';
      margin:auto;
      color:#8a8f98;
      font-weight:800;
    }
    .preview-card{
      background:#fff;
      border:1px solid #e1e3e8;
      border-radius:16px;
      padding:14px;
      box-shadow:0 12px 28px rgba(16,17,20,.07);
    }
    .preview-card canvas{
      width:400px;
      height:auto;
      max-height:720px;
      display:block;
      background:#fff;
      border-radius:10px;
    }
    .preview-name{font-weight:900;margin:0 0 10px;font-size:14px}
    .download{
      margin-top:12px;
      width:100%;
      border:1px solid rgba(255,105,46,.36);
      border-radius:12px;
      background:#fff6f1;
      color:var(--point);
      padding:11px;
      font-weight:900;
      cursor:pointer;
    }
    .download:hover{background:var(--point);color:#fff}

    .toast{
      position:fixed;
      left:50%;
      right:auto;
      bottom:26px;
      transform:translateX(-50%);
      min-width:360px;
      background:rgba(20,20,20,.92);
      color:#fff;
      padding:16px 20px;
      border-radius:16px;
      font-weight:900;
      display:none;
      z-index:10;
      box-shadow:0 18px 38px rgba(0,0,0,.22);
      backdrop-filter:blur(8px);
      text-align:center;
    }


    /* Option input card layout */
    .toolbar-spacer{flex:1 1 auto;min-width:24px}
    .mini.add-action{
      min-width:110px;
      border-radius:999px;
      border-color:rgba(255,105,46,.65);
      color:var(--point);
      background:#fff;
      box-shadow:none;
    }
    .mini.add-action:hover{background:var(--point-soft);color:var(--point)}
    .mini.sort-action{min-width:98px;border-radius:999px}
    .mini.sort-action.active{
      background:var(--point);
      border-color:var(--point);
      color:#fff;
      box-shadow:0 12px 22px rgba(255,105,46,.18);
    }
    .table-actions{display:none!important}

    #optionsPanel{overflow:visible}
    #optionsPanel .sheet-scroll{
      overflow:visible;
      padding:14px;
      background:#fff;
    }
    #optionsTable{
      min-width:0!important;
      width:100%;
      display:block;
      border-collapse:separate;
      border-spacing:0;
      background:transparent;
    }
    #optionsTable colgroup,#optionsTable thead{display:none}
    #optionsTable tbody{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    #optionsTable tbody tr{
      position:relative;
      display:grid!important;
      grid-template-columns:88px 210px 1.15fr 1.35fr .9fr 1fr 1fr 1fr;
      grid-template-areas:
        "check color sub title originLabel originPrice saleLabel salePrice"
        "check compDisplay compDisplay compDisplay compDisplay compParse compParse compParse";
      border:1px solid var(--line);
      border-radius:10px;
      overflow:hidden;
      background:#fff;
      box-shadow:0 8px 18px rgba(16,17,20,.035);
    }
    #optionsTable tbody tr[style*="display: none"]{display:none!important}
    #optionsTable tbody tr.dragging{opacity:.42;box-shadow:0 14px 28px rgba(16,17,20,.10)}
    #optionsTable.sort-mode tbody tr{cursor:default}
    #optionsTable th,#optionsTable td{
      min-width:0!important;
      width:auto!important;
      height:auto;
      min-height:58px;
      border-right:1px solid rgba(238,232,223,.8);
      border-bottom:1px solid var(--grid);
      padding:10px 16px;
      text-align:left;
      white-space:normal!important;
      word-break:break-word;
      overflow-wrap:anywhere;
      background:#fff;
      display:flex;
      flex-direction:row;
      align-items:center;
      justify-content:flex-start;
      gap:12px;
      line-height:1.28;
    }
    #optionsTable td::before{
      content:attr(data-label);
      display:block;
      flex:0 0 auto;
      font-size:14px;
      line-height:1;
      font-weight:900;
      color:#111;
    }
    #optionsTable td::after{display:none!important}
    #optionsTable td.select-col{
      grid-area:check;
      position:static;
      z-index:auto;
      box-shadow:none;
      border-bottom:0;
      align-items:center;
      justify-content:center;
      padding:10px 8px;
      gap:8px;
      background:#fafbfc;
      flex-direction:column;
    }
    #optionsTable td.select-col::before,#optionsTable td.select-col::after{display:none}
    .option-code-display{
      font-size:12px;
      line-height:1;
      font-weight:900;
      color:#111;
      letter-spacing:.01em;
      white-space:nowrap;
    }
    .option-check-wrap{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:7px;
    }
    #optionsTable td:nth-child(2){display:none!important}
    #optionsTable td:nth-child(3){grid-area:color}
    #optionsTable td:nth-child(4){grid-area:sub}
    #optionsTable td:nth-child(5){grid-area:title}
    #optionsTable td:nth-child(6){grid-area:originLabel}
    #optionsTable td:nth-child(7){grid-area:originPrice}
    #optionsTable td:nth-child(8){grid-area:saleLabel}
    #optionsTable td:nth-child(9){grid-area:salePrice}
    #optionsTable td:nth-child(10){grid-area:compDisplay}
    #optionsTable td:nth-child(11){grid-area:compParse}
    #optionsTable td:nth-child(7),#optionsTable td:nth-child(9){font-weight:900;font-size:17px}
    #optionsTable td:nth-child(9){border-right:0}
    #optionsTable td:nth-child(10),#optionsTable td:nth-child(11){border-bottom:0;min-height:64px}
    #optionsTable td:nth-child(11){border-right:0}
    #optionsTable td:nth-child(11){
      padding-right:104px;
    }
    #optionsTable tbody tr:hover td{background:#fff}
    #optionsTable tbody tr:hover td.select-col{background:#fafbfc}
    #optionsTable td[contenteditable="true"]:focus{
      background:#fff;
      box-shadow:inset 0 0 0 2px #cfd3da;
      border-radius:8px;
    }
    /* contenteditable 내부의 라벨 때문에 커서가 왼쪽으로 붙는 문제 보정 */
    #optionsTable td:not(.select-col){
      position:relative;
      padding-left:104px;
    }
    #optionsTable td:not(.select-col)::before{
      position:absolute;
      left:16px;
      top:50%;
      transform:translateY(-50%);
      width:78px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      pointer-events:none;
    }

    /* 컬러 셀은 값이 찌그러지지 않도록 별도 폭/줄바꿈 보정 */
    #optionsTable td:nth-child(3){
      padding-left:70px;
      white-space:nowrap!important;
      word-break:keep-all;
      overflow-wrap:normal;
    }
    #optionsTable td:nth-child(3)::before{
      width:42px;
    }
    #optionsTable td:nth-child(3)[contenteditable="true"]{
      font-size:16px;
      letter-spacing:0;
    }
    #optionsTable td:nth-child(10),#optionsTable td:nth-child(11){
      padding-left:104px;
      align-items:center;
    }
    .drag-handle{
      display:none;
      width:24px;
      height:24px;
      border:1px solid #dfe2e7;
      border-radius:999px;
      align-items:center;
      justify-content:center;
      font-size:13px;
      line-height:1;
      color:#7b818c;
      background:#fff;
      cursor:grab;
      user-select:none;
      touch-action:none;
    }
    .drag-handle:active{cursor:grabbing}
    #optionsTable.sort-mode .drag-handle{display:flex}
    #optionsTable.sort-mode .option-check-wrap .row-check{display:none}


    /* Tone update: grayscale base + orange point only */
    .tab{
      border-radius:0;
      background:transparent!important;
      box-shadow:none!important;
    }
    .tab.active{
      background:transparent!important;
      border-color:transparent!important;
      color:var(--point)!important;
      font-weight:950;
    }


    /* 구성안내 실시간 검증 */
    @keyframes compositionShake{
      0%,100%{transform:translateX(0)}
      18%{transform:translateX(-7px)}
      36%{transform:translateX(7px)}
      54%{transform:translateX(-5px)}
      72%{transform:translateX(5px)}
    }
    #optionsTable td.composition-error{
      box-shadow:inset 0 0 0 2px #ff4d4f!important;
      background:#fffafa!important;
      padding-bottom:34px!important;
    }
    #optionsTable td.composition-error::after{
      content:attr(data-error);
      display:block!important;
      position:absolute;
      left:104px;
      right:16px;
      bottom:8px;
      font-size:12px;
      line-height:1.28;
      font-weight:900;
      color:#ff3b30;
      white-space:pre-line;
      pointer-events:none;
    }
    #optionsTable td.composition-shake{
      animation:compositionShake .36s ease both;
    }
    #optionsTable td.composition-ok{
      box-shadow:inset 0 0 0 2px rgba(39,174,96,.28)!important;
    }

</style>
</head>
<body>

function toast(msg){ const t=$('#toast'); t.textContent=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',2200); }
function nowText(){ return new Date().toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit', second:'2-digit' }); }
function bindRowSelect(tr, tableId){
  tr.addEventListener('focusin',()=>{ selectedRow={tableId,tr}; });
  tr.addEventListener('click',e=>{ if(!e.target.classList.contains('row-check')) selectedRow={tableId,tr}; });
}

function getVisibleRows(tableId){
  return getRows(tableId).filter(tr => tr.style.display !== 'none');
}
function setRowChecked(tr, checked){
  const ch = tr?.querySelector('.row-check');
  if(ch) ch.checked = checked;
}
function setRangeChecked(tableId, fromTr, toTr, checked){
  const rows = getVisibleRows(tableId);
  const from = rows.indexOf(fromTr);
  const to = rows.indexOf(toTr);
  if(from < 0 || to < 0) return;
  const [start, end] = from <= to ? [from, to] : [to, from];
  rows.slice(start, end + 1).forEach(row => setRowChecked(row, checked));
}
function syncHeaderCheckState(tableId){
  const head = document.querySelector(`.head-check[data-table="${tableId}"]`);
  if(!head) return;
  const visible = getVisibleRows(tableId);
  const checks = visible.map(tr => tr.querySelector('.row-check')).filter(Boolean);
  head.checked = checks.length > 0 && checks.every(ch => ch.checked);
  head.indeterminate = checks.some(ch => ch.checked) && !head.checked;
}
function bindRowCheck(check, tableId){
  const td = check.closest('td');

  function applyDragTarget(targetCheck){
    if(!targetCheck) return;
    targetCheck.checked = checkDrag.checked;
    lastCheckedRow = { tableId, tr: targetCheck.closest('tr'), checked: targetCheck.checked };
    syncHeaderCheckState(tableId);
  }

  // 체크박스 기본 click 토글은 막고, 아래 pointerdown에서만 직접 제어함.
  // 이렇게 해야 클릭 1번에 체크가 두 번 뒤집히는 현상이 안 생김.
  check.addEventListener('click', e => {
    e.preventDefault();
    e.stopPropagation();
  });

  td.addEventListener('pointerdown', e => {
    if(e.target.closest('.drag-handle')) return;
    if(e.button !== 0) return;
    e.preventDefault();
    e.stopPropagation();

    const targetCheck = td.querySelector('.row-check');
    const tr = targetCheck?.closest('tr');
    if(!targetCheck || !tr) return;

    // Shift + 클릭: 마지막 선택 행부터 현재 행까지 범위 선택
    if(e.shiftKey && lastCheckedRow?.tableId === tableId && lastCheckedRow.tr){
      const targetState = lastCheckedRow.checked;
      setRangeChecked(tableId, lastCheckedRow.tr, tr, targetState);
      syncHeaderCheckState(tableId);
      checkDrag = { active:false, wasDragging:false, tableId:null, checked:true };
      return;
    }

    // 일반 클릭/드래그 시작: 현재 체크 상태를 한 번만 반전
    const nextChecked = !targetCheck.checked;
    checkDrag = {
      active:true,
      wasDragging:false,
      tableId,
      checked: nextChecked
    };
    applyDragTarget(targetCheck);
  });

  td.addEventListener('pointerenter', () => {
    if(!checkDrag.active || checkDrag.tableId !== tableId) return;
    checkDrag.wasDragging = true;
    applyDragTarget(td.querySelector('.row-check'));
  });
}

window.addEventListener('pointerup', () => { checkDrag.active = false; });
window.addEventListener('blur', () => { checkDrag.active = false; });

function getHeadersByTableId(tableId){
  if(tableId==='optionsTable') return OPTION_HEADERS;
  if(tableId==='dbTable') return DB_HEADERS;
  return RULE_HEADERS;
}
function getLabelsByTableId(tableId){
  if(tableId==='optionsTable') return OPTION_LABELS;
  if(tableId==='dbTable') return DB_LABELS;
  return RULE_LABELS;
}
function getTableIdFromCell(td){
  return td.closest('table')?.id || '';
}
function getHeaderNameFromCell(td){
  const tr=td.parentElement;
  const tableId=getTableIdFromCell(td);
  const headers=getHeadersByTableId(tableId);
  const colIndex=[...tr.children].indexOf(td)-1;
  return headers[colIndex] || '';
}
function formatCurrencyText(value){
  const digits=String(value || '').replace(/[^0-9]/g,'');
  if(!digits) return String(value || '').trim();
  return `${Number(digits).toLocaleString('ko-KR')}원`;
}
function formatPriceCell(td){
  const header=getHeaderNameFromCell(td);
  if(header==='origin_price' || header==='sale_price'){
    td.innerText=formatCurrencyText(td.innerText);
  }
}
function placeCaretEnd(el){
  el.focus();
  const range=document.createRange();
  range.selectNodeContents(el);
  range.collapse(false);
  const sel=window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}
function moveToNextEditableCell(td){
  const table=td.closest('table');
  if(!table) return;
  const cells=[...table.querySelectorAll('tbody td[contenteditable="true"]')];
  const currentIndex=cells.indexOf(td);
  const next=cells[currentIndex+1];
  if(!next) return;
  const tableId=table.id;
  const rowIndex=getRows(tableId).indexOf(next.parentElement);
  if(rowIndex >= 0){
    tablePage[tableId]=Math.floor(rowIndex / PAGE_SIZE) + 1;
    updateTablePage(tableId);
  }
  requestAnimationFrame(()=>placeCaretEnd(next));
}
function handleCellKeydown(e){
  if(e.key !== 'Enter') return;
  e.preventDefault();
  const cell = e.currentTarget;
  formatPriceCell(cell);
  if(cell?.dataset?.key === 'composition_display'){
    const ok = autoConvertCompositionForRow(cell.closest('tr'), true, {showErrors:true, showOk:true});
    if(!ok) return; // 오류가 있으면 현재 칸에 머물러서 바로 수정 가능하게 유지
  }
  moveToNextEditableCell(cell);
}

function getNextOptionCode(){
  const nums=getRows('optionsTable').map(tr=>{
    const txt=(tr.querySelectorAll('td')[1]?.innerText||'').trim();
    const m=txt.match(/(\d+)/);
    return m ? Number(m[1]) : 0;
  });
  return `SET ${String(Math.max(0,...nums)+1).padStart(3,'0')}`;
}
let optionSortMode = false;
let optionDraggingRow = null;
let optionDragMoveHandler = null;
let optionDragUpHandler = null;
function renumberOptionCodes(){
  getRows('optionsTable').forEach((tr,i)=>{
    const code = `SET ${String(i+1).padStart(3,'0')}`;
    if(tr.children[1]) tr.children[1].innerText = code;
    const display = tr.querySelector('.option-code-display');
    if(display) display.textContent = code;
  });
}
function setOptionSortMode(on){
  optionSortMode = !!on;
  const table = $('#optionsTable');
  if(table) table.classList.toggle('sort-mode', optionSortMode);
  const btn = $('#sortModeBtn');
  if(btn) btn.classList.toggle('active', optionSortMode);
  if(optionSortMode) toast('행 왼쪽 ☰ 아이콘을 드래그해서 순서를 바꿔줘');
}
function endOptionDrag(){
  if(optionDraggingRow) optionDraggingRow.classList.remove('dragging');
  optionDraggingRow = null;
  document.removeEventListener('pointermove', optionDragMoveHandler);
  document.removeEventListener('pointerup', optionDragUpHandler);
  optionDragMoveHandler = null;
  optionDragUpHandler = null;
  renumberOptionCodes();
  updateTablePage('optionsTable');
}
function bindOptionRowDrag(tr){
  const handle = tr.querySelector('.drag-handle');
  if(!handle) return;
  handle.addEventListener('pointerdown', e=>{
    if(!optionSortMode) return;
    e.preventDefault();
    e.stopPropagation();
    optionDraggingRow = tr;
    tr.classList.add('dragging');
    try{ handle.setPointerCapture(e.pointerId); }catch(err){}
    optionDragMoveHandler = ev=>{
      if(!optionSortMode || !optionDraggingRow) return;
      const target = document.elementFromPoint(ev.clientX, ev.clientY)?.closest('#optionsTable tbody tr');
      if(!target || target === optionDraggingRow || target.style.display === 'none') return;
      const tbody = target.parentElement;
      const rect = target.getBoundingClientRect();
      const before = ev.clientY < rect.top + rect.height / 2;
      tbody.insertBefore(optionDraggingRow, before ? target : target.nextSibling);
    };
    optionDragUpHandler = ()=>endOptionDrag();
    document.addEventListener('pointermove', optionDragMoveHandler);
    document.addEventListener('pointerup', optionDragUpHandler, {once:true});
  });
}

function createEmptyRow(tableId, cols, autoCode=false){
  const tr=document.createElement('tr');
  const checkTd=document.createElement('td');
  checkTd.className='select-col';
  checkTd.innerHTML = tableId === 'optionsTable'
    ? `<span class="option-code-display"></span><span class="option-check-wrap"><input type="checkbox" class="row-check" data-table="${tableId}"><span class="drag-handle" title="드래그로 순서 이동">☰</span></span>`
    : `<input type="checkbox" class="row-check" data-table="${tableId}">`;
  tr.appendChild(checkTd);
  bindRowCheck(checkTd.querySelector('.row-check'), tableId);
  const labels = getLabelsByTableId(tableId);
  const headers = getHeadersByTableId(tableId);
  for(let c=0;c<cols;c++){
    const td=document.createElement('td');
    td.dataset.label = labels[c] || '';
    td.dataset.key = headers[c] || '';
    td.contentEditable='true';
    td.addEventListener('keydown', handleCellKeydown);
    td.addEventListener('blur', () => formatPriceCell(td));
    if(tableId === 'optionsTable' && headers[c] === 'composition_display'){
      // 작성 중에는 경고를 띄우지 않고, 형식이 완성되었을 때만 조용히 누끼배치를 갱신
      td.addEventListener('input', () => autoConvertCompositionForRow(tr, false, {showErrors:false, showOk:false}));
      // 입력칸을 벗어났을 때만 에러/성공 상태 표시
      td.addEventListener('blur', () => autoConvertCompositionForRow(tr, true, {showErrors:true, showOk:true}));
    }
    td.addEventListener('mousedown', e => {
      if(e.target === td && !String(td.innerText || '').trim()){
        requestAnimationFrame(() => placeCaretEnd(td));
      }
    });
    tr.appendChild(td);
  }


  if(tableId==='optionsTable' && autoCode){
    tr.children[1].innerText=getNextOptionCode(); // option_code
    tr.children[5].innerText='정상가';          // original_price_label
    tr.children[7].innerText='단독 최저가';     // sale_price_label
  }

  bindRowSelect(tr, tableId);
  if(tableId === 'optionsTable'){
    const display = tr.querySelector('.option-code-display');
    if(display) display.textContent = tr.children[1]?.innerText || '';
    bindOptionRowDrag(tr);
  }
  return tr;
}
function getRows(tableId){ return [...document.querySelectorAll(`#${tableId} tbody tr`)]; }
function ensureMinRows(tableId, cols){
  const tbody=document.querySelector(`#${tableId} tbody`);
  while(getRows(tableId).length < MIN_VISIBLE_ROWS){ tbody.appendChild(createEmptyRow(tableId, cols, false)); }
}
function resetHeaderCheck(tableId){ const h=document.querySelector(`.head-check[data-table="${tableId}"]`); if(h){ h.checked=false; h.indeterminate=false; } }
function makeRows(tableId, cols, count){
  const tbody = document.querySelector(`#${tableId} tbody`);
  for(let r=0;r<count;r++) tbody.appendChild(createEmptyRow(tableId, cols));
  updateTablePage(tableId);
}
function activeTable(){ if(!$('#optionsPanel').classList.contains('hidden')) return {id:'optionsTable', cols:OPTION_HEADERS.length, headers:OPTION_HEADERS}; if(!$('#dbPanel').classList.contains('hidden')) return {id:'dbTable', cols:DB_HEADERS.length, headers:DB_HEADERS}; return {id:'rulesTable', cols:RULE_HEADERS.length, headers:RULE_HEADERS}; }
function readTable(tableId, headers){ return getRows(tableId).map(tr=>{ const cells=[...tr.children].slice(1); const obj={}; headers.forEach((h,i)=>obj[h]=(cells[i]?.innerText||'').trim()); return obj; }).filter(row=>Object.values(row).some(Boolean)); }
function setTableData(tableId, headers, rows){
  const tbody=document.querySelector(`#${tableId} tbody`); tbody.innerHTML='';
  rows.forEach(row=>{ const tr=createEmptyRow(tableId, headers.length, false); headers.forEach((h,i)=>{ tr.children[i+1].innerText=row[h]||''; }); tbody.appendChild(tr); });
  ensureMinRows(tableId, headers.length);
  tablePage[tableId]=1;
  resetHeaderCheck(tableId);
  if(tableId==='optionsTable') renumberOptionCodes();
  updateTablePage(tableId);
}
function updateTablePage(tableId){
  const rows=getRows(tableId);
  const pageCount=Math.max(1, Math.ceil(rows.length/PAGE_SIZE));
  tablePage[tableId]=Math.min(Math.max(1, tablePage[tableId]||1), pageCount);
  const page=tablePage[tableId];
  rows.forEach((tr,i)=>{
    tr.style.display=(i >= (page-1)*PAGE_SIZE && i < page*PAGE_SIZE) ? '' : 'none';
  });
  renderPagination(tableId);
  syncHeaderCheckState(tableId);
}
function renderPagination(tableId){
  const wrap = tableId==='optionsTable' ? $('#optionsPagination') : tableId==='dbTable' ? $('#dbPagination') : $('#rulesPagination');
  if(!wrap) return;
  const rows=getRows(tableId);
  const pageCount=Math.max(1, Math.ceil(rows.length/PAGE_SIZE));
  const page=tablePage[tableId]||1;
  wrap.innerHTML='';
  const prev=document.createElement('button'); prev.className='page-btn'; prev.textContent='<'; prev.disabled=page<=1; prev.onclick=()=>{ tablePage[tableId]=page-1; updateTablePage(tableId); };
  wrap.appendChild(prev);
  for(let i=1;i<=pageCount;i++){
    const b=document.createElement('button'); b.className='page-btn'+(i===page?' active':''); b.textContent=i; b.onclick=()=>{ tablePage[tableId]=i; updateTablePage(tableId); };
    wrap.appendChild(b);
  }
  const next=document.createElement('button'); next.className='page-btn'; next.textContent='>'; next.disabled=page>=pageCount; next.onclick=()=>{ tablePage[tableId]=page+1; updateTablePage(tableId); };
  wrap.appendChild(next);
}
function addActiveRow(){
  const t=activeTable();
  const tbody=document.querySelector(`#${t.id} tbody`);
  tbody.appendChild(createEmptyRow(t.id,t.cols,true));
  tablePage[t.id]=Math.ceil(getRows(t.id).length/PAGE_SIZE);
  resetHeaderCheck(t.id);
  updateTablePage(t.id);
}

function addRowsToTable(tableId, count=1){
  const headers=getHeadersByTableId(tableId);
  const tbody=document.querySelector(`#${tableId} tbody`);
  const n = Math.max(1, Number(count) || 1);
  for(let i=0;i<n;i++) tbody.appendChild(createEmptyRow(tableId, headers.length, true));
  tablePage[tableId]=Math.ceil(getRows(tableId).length/PAGE_SIZE);
  resetHeaderCheck(tableId);
  if(tableId==='optionsTable') renumberOptionCodes();
  updateTablePage(tableId);
}
function deleteRowsFromTable(tableId){
  const headers=getHeadersByTableId(tableId);
  const checked=getRows(tableId).filter(tr=>tr.querySelector('.row-check')?.checked);
  if(!checked.length){ toast('삭제할 행을 체크해줘'); return; }
  if(!confirm(`${checked.length}개 행을 진짜 삭제할까?`)) return;
  checked.forEach(tr=>tr.remove());
  selectedRow=null;
  ensureMinRows(tableId,headers.length);
  resetHeaderCheck(tableId);
  if(tableId==='optionsTable') renumberOptionCodes();
  updateTablePage(tableId);
  toast(`${checked.length}개 행 삭제`);
}

function deleteActiveRow(){
  const t=activeTable();
  const checked=getRows(t.id).filter(tr=>tr.querySelector('.row-check')?.checked);
  const targets=checked.length ? checked : [];
  if(!targets.length){ toast('삭제할 행을 체크해줘'); return; }
  if(!confirm(`${targets.length}개 행을 진짜 삭제할까?`)) return;
  targets.forEach(tr=>tr.remove());
  selectedRow=null;
  ensureMinRows(t.id,t.cols);
  resetHeaderCheck(t.id);
  if(t.id==='optionsTable') renumberOptionCodes();
  updateTablePage(t.id);
  toast(`${targets.length}개 행 삭제`);
}
function clearAllActive(){
  const t=activeTable();
  if(!confirm('전체 행을 진짜 삭제할까?')) return;
  document.querySelector(`#${t.id} tbody`).innerHTML='';
  ensureMinRows(t.id,t.cols);
  tablePage[t.id]=1;
  selectedRow=null;
  resetHeaderCheck(t.id);
  updateTablePage(t.id);
  toast('전체 삭제 완료');
}

async function saveImageDb(){

    .filter(row => row.product_key || row.product_group || row.flavor || row.image_url)
    .map(row => ({
      product_key: row.product_key || '',
      product_group: row.product_group || '',
      flavor: row.flavor || '',
      image_url: row.image_url || '',
      updated_at: new Date().toISOString()
    }));

function normalizeMatchText(value){
  return String(value || '').replace(/\s+/g, '').trim().toLowerCase();
}
function normalizeFlavorText(value){
  // 맛 이름은 담당자별로 '맛'을 넣거나 빼도 같은 값으로 인식
  // 예: 허니소이맛 / 허니소이 / 허니 소이 맛 → 허니소이
  return String(value || '').replace(/맛/g, '').replace(/\s+/g, '').trim().toLowerCase();
}
function compactProductKey(value){
  // 제품군/맛/상품키에 들어간 모든 띄어쓰기는 DB 매칭 및 출력에서 무시
  return String(value || '').replace(/\s+/g, '').trim();
}
function buildProductLookup(dbRows){
  const lookup = new Map();
  const groups = new Map();
  const flavorsByGroup = new Map();

  (dbRows || []).forEach(row => {
    const group = normalizeMatchText(row.product_group);
    const flavor = normalizeFlavorText(row.flavor);
    const groupRaw = compactProductKey(row.product_group);
    const flavorRaw = compactProductKey(row.flavor);

    if(group && groupRaw && !groups.has(group)) groups.set(group, groupRaw);
    if(group && flavor && flavorRaw){
      if(!flavorsByGroup.has(group)) flavorsByGroup.set(group, new Map());
      flavorsByGroup.get(group).set(flavor, flavorRaw);
    }
    if(group && flavor && row.product_key){
      lookup.set(`${group}::${flavor}`, compactProductKey(row.product_key));
    }
  });
  return { lookup, groups, flavorsByGroup };
}
function findMatchedDbGroup(group, productMeta){
  const groupKey = normalizeMatchText(group);
  if(!groupKey) return '';
  if(productMeta.groups.has(groupKey)) return groupKey;

  // DB의 제품군명이 구성안내의 제품군명과 완전히 같지 않아도 어느 정도 매칭되게 보정
  for(const dbGroup of productMeta.groups.keys()){
    const groupMatched = dbGroup === groupKey || dbGroup.includes(groupKey) || groupKey.includes(dbGroup);
    if(groupMatched) return dbGroup;
  }
  return '';
}
function findProductKeyFromGuide(group, flavor, productMeta){
  const groupKey = normalizeMatchText(group);
  const flavorKey = normalizeFlavorText(flavor);
  if(!flavorKey) return '';

  const exact = productMeta.lookup.get(`${groupKey}::${flavorKey}`);
  if(exact) return exact;

  const matchedGroup = findMatchedDbGroup(group, productMeta);
  if(matchedGroup){
    const matched = productMeta.lookup.get(`${matchedGroup}::${flavorKey}`);
    if(matched) return matched;
  }

  const cleanGroup = compactProductKey(group);
  const cleanFlavor = compactProductKey(flavor);
  return cleanGroup ? `${cleanGroup}:${cleanFlavor}` : cleanFlavor;
}
function splitGuideGroups(displayText){
  const text = String(displayText || '').replace(/\r/g, '\n').replace(/\n+/g, ' + ');
  const groups = [];
  let buf = '';
  let depth = 0;

  for(const ch of text){
    if(ch === '('){ depth++; buf += ch; continue; }
    if(ch === ')'){ depth = Math.max(0, depth - 1); buf += ch; continue; }
    if(ch === '+' && depth === 0){
      const value = buf.trim();
      if(value) groups.push(value);
      buf = '';
      continue;
    }
    buf += ch;
  }

  const last = buf.trim();
  if(last) groups.push(last);
  return groups;
}
function validateAndConvertCompositionGuide(displayText, dbRows){
  const text = String(displayText || '').trim();
  const errors = [];
  const output = [];
  const productMeta = buildProductLookup(dbRows || []);

  if(!text) return { ok:true, value:'', errors:[] };

  const openCount = (text.match(/\(/g) || []).length;
  const closeCount = (text.match(/\)/g) || []).length;
  if(openCount > closeCount) errors.push('괄호가 닫히지 않았습니다. 예: 통살(핫양념치킨3, 허니소이3)');
  if(closeCount > openCount) errors.push('여는 괄호가 없습니다. 예: 통살(핫양념치킨3, 허니소이3)');

  const groupBlocks = splitGuideGroups(text);
  if(!groupBlocks.length) errors.push('구성안내 형식이 비어있습니다.');

  groupBlocks.forEach(groupBlock => {
    const match = groupBlock.match(/^([^()]+?)\s*\(([^()]*)\)\s*$/);
    if(!match){
      if(groupBlock.trim()) errors.push(`형식이 올바르지 않습니다: ${groupBlock.trim()}`);
      return;
    }

    const group = match[1].trim();
    const flavorsText = match[2].trim();
    const groupName = compactProductKey(group);

    if(!groupName){
      errors.push('제품군이 누락되었습니다. 예: 통살(핫양념치킨3)');
      return;
    }

    const matchedGroup = findMatchedDbGroup(group, productMeta);
    if(!matchedGroup){
      errors.push(`제품군 '${groupName}'을 이미지 DB에서 찾을 수 없습니다.`);
    }

    if(!flavorsText){
      errors.push(`제품군 '${groupName}' 안에 맛이 없습니다.`);
      return;
    }

    flavorsText.split(/\s*,\s*/).forEach(item => {
      const raw = item.trim();
      if(!raw) return;

      const qtyMatch = raw.match(/^(.*?)(?:\s*[xX×]\s*|\s*)(\d+)\s*$/);
      if(!qtyMatch){
        errors.push(`'${compactProductKey(raw)}' 수량이 누락되었습니다. 예: ${compactProductKey(raw)}3`);
        return;
      }

      const flavor = qtyMatch[1].trim();
      const qty = Number(qtyMatch[2]);
      const flavorName = compactProductKey(flavor);

      if(!flavorName){
        errors.push(`제품군 '${groupName}' 안에 맛 이름이 누락되었습니다.`);
        return;
      }
      if(!qty || qty < 1){
        errors.push(`'${flavorName}' 수량이 올바르지 않습니다.`);
        return;
      }

      if(matchedGroup){
        const flavorMap = productMeta.flavorsByGroup.get(matchedGroup) || new Map();
        const flavorKey = normalizeFlavorText(flavor);
        if(!flavorMap.has(flavorKey)){
          errors.push(`맛 '${flavorName}'을 제품군 '${groupName}'에서 찾을 수 없습니다.`);
        }
      }

      const productKey = findProductKeyFromGuide(group, flavor, productMeta);
      output.push(`${productKey}x${qty}`);
    });
  });

  const uniqueErrors = [...new Set(errors)];
  return { ok: uniqueErrors.length === 0, value: output.join(','), errors: uniqueErrors };
}
function convertCompositionGuideToParse(displayText, dbRows){
  return validateAndConvertCompositionGuide(displayText, dbRows).value;
}
function setCompositionGuideStatus(displayCell, messages, type=''){
  if(!displayCell) return;
  displayCell.classList.remove('composition-error','composition-ok');
  delete displayCell.dataset.error;
  if(type === 'error'){
    displayCell.classList.add('composition-error');
    displayCell.dataset.error = messages.join('\n');
  }else if(type === 'ok'){
    displayCell.classList.add('composition-ok');
    setTimeout(() => displayCell.classList.remove('composition-ok'), 420);
  }
}
function shakeCompositionCell(displayCell){
  if(!displayCell) return;
  displayCell.classList.remove('composition-shake');
  void displayCell.offsetWidth;
  displayCell.classList.add('composition-shake');
  setTimeout(() => displayCell.classList.remove('composition-shake'), 420);
}
function autoConvertCompositionForRow(tr, shouldShake=false, options={}){
  const {showErrors=true, showOk=true} = options;
  const cells = tr?.children ? [...tr.children] : [];
  const displayCell = cells[9];  // 구성안내
  const parseCell = cells[10];   // 누끼배치
  if(!displayCell || !parseCell) return false;

  const displayText = String(displayCell.innerText || '').trim();
  if(!displayText){
    parseCell.innerText = '';
    setCompositionGuideStatus(displayCell, [], '');
    return true;
  }

  const dbRows = readTable('dbTable', DB_HEADERS);
  const result = validateAndConvertCompositionGuide(displayText, dbRows);
  if(result.ok){
    parseCell.innerText = result.value;
    setCompositionGuideStatus(displayCell, showOk ? ['변환 완료'] : [], showOk ? 'ok' : '');
    return true;
  }

  // 작성 중에는 경고를 숨기고 기존 누끼배치 값을 유지
  if(!showErrors){
    setCompositionGuideStatus(displayCell, [], '');
    return false;
  }

  // 에러 발생 시 기존 누끼배치 값은 유지하고, 구성안내 칸에만 경고 표시
  setCompositionGuideStatus(displayCell, result.errors.map(msg => `❌ ${msg}`), 'error');
  if(shouldShake) shakeCompositionCell(displayCell);
  return false;
}

function parseComposition(str){
  if(!str) return [];
  const out=[];
  str.split(',').forEach(part=>{
    const raw=part.trim(); if(!raw) return;
    const m=raw.match(/(.+?)x(\d+)$/i);
    if(m){ out.push({key:m[1].trim(), count:Number(m[2])}); }
    else { out.push({key:raw, count:1}); }
  });
  return out;
}

function hex(hex, fallback){ if(!hex) return fallback; const v=String(hex).trim(); return /^#[0-9a-f]{6}$/i.test(v) ? v : fallback; }
function normalizeImageSrc(src){
  const raw = String(src || '').trim();
  if(!raw) return '';
  if(/^https?:\/\//i.test(raw) || raw.startsWith('data:') || raw.startsWith('blob:')) return raw;
  if(raw.startsWith('/')) return raw;
  if(raw.startsWith('./') || raw.startsWith('../')) return raw;
  return `./${raw}`;
}
function isExternalImageSrc(src){
  try{
    const url = new URL(src, window.location.href);
    return url.origin !== window.location.origin && /^https?:$/i.test(url.protocol);
  }catch(e){
    return false;
  }
}
function loadImage(src){
  return new Promise((resolve,reject)=>{
    const normalizedSrc = normalizeImageSrc(src);
    if(!normalizedSrc) return reject(new Error('no src'));
    if(imageCache.has(normalizedSrc)) return resolve(imageCache.get(normalizedSrc));

    const img = new Image();
    if(isExternalImageSrc(normalizedSrc)) img.crossOrigin = 'anonymous';

    img.onload = () => {
      imageCache.set(normalizedSrc, img);
      resolve(img);
    };
    img.onerror = () => reject(new Error(`image load failed: ${normalizedSrc}`));
    img.src = normalizedSrc;
  });
}

function roundRect(ctx,x,y,w,h,r){ const rr=Math.min(r,w/2,h/2); ctx.beginPath(); ctx.moveTo(x+rr,y); ctx.arcTo(x+w,y,x+w,y+h,rr); ctx.arcTo(x+w,y+h,x,y+h,rr); ctx.arcTo(x,y+h,x,y,rr); ctx.arcTo(x,y,x+w,y,rr); ctx.closePath(); }
function fitText(ctx, text, maxWidth, startSize, weight='800'){ let size=startSize; do{ ctx.font=`${weight} ${size}px Arial, Pretendard, sans-serif`; if(ctx.measureText(text).width<=maxWidth) return size; size-=2; }while(size>16); return size; }
function wrapTextLines(ctx, text, maxWidth){
  text = String(text || '').trim();
  if(!text) return [''];
  const hardLines = text.split(/\n/);
  const lines = [];
  for(const hardLine of hardLines){
    let current = '';
    const chars = [...hardLine];
    for(const ch of chars){
      const test = current + ch;
      if(current && ctx.measureText(test).width > maxWidth){
        lines.push(current.trimEnd());
        current = ch;
      } else {
        current = test;
      }
    }
    lines.push(current.trimEnd());
  }
  return lines.length ? lines : [''];
}
function drawWrappedText(ctx, lines, x, y, lineHeight){
  lines.forEach((line, i) => ctx.fillText(line, x, y + i * lineHeight));
}

async function drawTemplate(option, db){
  const t = FIGMA_TEMPLATE;

  const compLines = wrapTextLines(measureCtx, option.composition_display || '', compMaxWidth);
  const extraHeight = Math.max(0, compLines.length - 1) * compLineHeight;
  const canvas=document.createElement('canvas');
  canvas.width=t.width;
  canvas.height=t.height + extraHeight;
  const ctx=canvas.getContext('2d');

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle=t.background;

  // Figma OPTION_TEMPLATE coded guide

  ctx.font=`${t.titleText.weight} ${titleSize}px Arial, Pretendard, sans-serif`;
  ctx.fillText(title,t.titleText.x,t.titleText.y);

  await renderImagesCanvas(ctx, t.imageArea, option, db);

  const b=t.priceBox;
  ctx.fillStyle='#f4f4f4';

  ctx.textAlign='left';

  ctx.fillText(option.original_price_label||'', t.originLabel.x, t.originLabel.y);

  const op=option.origin_price||'';
  ctx.fillText(op, t.originPrice.x, t.originPrice.y);
  const opM=ctx.measureText(op);
  ctx.strokeStyle=t.originPrice.color;
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(t.originPrice.x-opM.width, t.originPrice.strikeY);
  ctx.lineTo(t.originPrice.x, t.originPrice.strikeY);
  ctx.stroke();

  ctx.fillStyle=hex(option.color,'#000000');
  ctx.font=`${t.salePrice.weight} ${t.salePrice.size}px Arial, Pretendard, sans-serif`;
  ctx.textAlign=t.salePrice.align;
  ctx.fillText(option.sale_price||'', t.salePrice.x, t.salePrice.y);

  ctx.strokeStyle=t.divider.color;
  ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(t.divider.x1,t.divider.y);
  ctx.lineTo(t.divider.x2,t.divider.y);
  ctx.stroke();

  ctx.textAlign='left';
  ctx.fillStyle=t.composition.color;
  ctx.font=`${t.composition.weight} ${t.composition.size}px Arial, Pretendard, sans-serif`;
  drawWrappedText(ctx, compLines, t.composition.x, t.composition.y, compLineHeight);
  return canvas;
}

async function renderImagesCanvas(ctx, area, option, db){
  const images = await resolveImages(option, db);
  if(!images.length) return;
  let rows = getRuleForTotal(images.length);
  if(!rows.length) rows=[images.length];
  const rowCount=rows.length; const maxCountInRow=Math.max(...rows); const verticalOverlap=rowCount>1 ? (maxCountInRow>=10?0:OVERLAP_Y) : 0;
  const targetBlockHeight=area.h*TARGET_BLOCK_HEIGHT_RATIO; const baseImageHeight=(targetBlockHeight + verticalOverlap*(rowCount-1))/rowCount;
  let imageIndex=0; const allRows=[];
  for(const count of rows){ const nodes=[]; for(let i=0;i<count;i++){ const data=images[imageIndex++]; if(!data) continue; try{ const img=await loadImage(data.url); const ratio=img.width/img.height; nodes.push({img, key:data.key, w:baseImageHeight*ratio, h:baseImageHeight}); }catch(e){ nodes.push({img:null, key:data?.key||'NO IMAGE', w:baseImageHeight*.7, h:baseImageHeight}); } } allRows.push(nodes); }
  const rowWidth = nodes => nodes.reduce((s,n)=>s+n.w,0)-OVERLAP_X*(nodes.length-1);
  const maxRowWidth=Math.max(...allRows.map(rowWidth),1); let scale=1; if(maxRowWidth>area.w) scale=area.w/maxRowWidth;
  const scaledBlockHeight=(baseImageHeight*scale)*rowCount-(verticalOverlap*scale)*(rowCount-1); if(scaledBlockHeight>area.h) scale*=area.h/scaledBlockHeight;
  allRows.forEach(row=>row.forEach(n=>{n.w*=scale;n.h*=scale;}));
  const finalImageHeight=baseImageHeight*scale; const finalOverlapY=verticalOverlap*scale; const totalBlockHeight=finalImageHeight*rowCount-finalOverlapY*(rowCount-1); let y=area.y+(area.h-totalBlockHeight)/2;
  for(const row of allRows){ const totalW=rowWidth(row); let x=area.x+(area.w-totalW)/2; for(const n of row){ if(n.img){ ctx.drawImage(n.img,x,y,n.w,n.h); } else { ctx.fillStyle='#ffe1e1'; roundRect(ctx,x,y,n.w,n.h,8); ctx.fill(); ctx.fillStyle='#cc3333'; ctx.textAlign='center'; ctx.font='700 13px Arial'; ctx.fillText('NO IMAGE',x+n.w/2,y+n.h/2-4); ctx.fillText(n.key,x+n.w/2,y+n.h/2+14); } x+=n.w-OVERLAP_X; } y+=finalImageHeight-finalOverlapY; }
}

function readCheckedOptions(){
  return getRows('optionsTable')
    .filter(tr => tr.querySelector('.row-check')?.checked)
    .map(tr => {
      const cells=[...tr.children].slice(1);
      const obj={};
      OPTION_HEADERS.forEach((h,i)=>obj[h]=(cells[i]?.innerText||'').trim());
      return obj;
    })
    .filter(row=>Object.values(row).some(Boolean));
}
function combineCanvasesVertical(canvases){
  const combined=document.createElement('canvas');
  combined.width=TEMPLATE_W;
  combined.height=canvases.reduce((sum, canvas) => sum + canvas.height, 0);
  const ctx=combined.getContext('2d');
  ctx.fillStyle='#fff';
  ctx.fillRect(0,0,combined.width,combined.height);
  let y = 0;
  canvases.forEach(canvas => { ctx.drawImage(canvas,0,y); y += canvas.height; });
  return combined;
}
async function generate(){
  generated.length=0; $('#cards').innerHTML='';
  const options=readCheckedOptions(); const db=readTable('dbTable', DB_HEADERS);
  if(!options.length){ toast('생성할 행을 체크해줘'); return; }
  const canvases=[];
  for(const option of options){ canvases.push(await drawTemplate(option, db)); }
  const combined=combineCanvasesVertical(canvases);
  generated.push({name:'option_selected_combined', canvas:combined});
  const card=document.createElement('div');
  card.className='preview-card';
  const btn=document.createElement('button');
  btn.className='download';
  btn.textContent='PNG 다운로드';
  btn.onclick=()=>downloadCanvas(combined, 'option_selected_combined.png');
  card.append(combined,btn);
  $('#cards').appendChild(card);
  toast(`${options.length}개 옵션을 1장으로 생성 완료`);
}
function downloadCanvas(canvas, filename){ const a=document.createElement('a'); a.download=filename; a.href=canvas.toDataURL('image/png'); a.click(); }
function downloadAll(){ if(!generated.length){ toast('생성된 이미지 없음'); return; } downloadCanvas(generated[0].canvas, `${generated[0].name}.png`); }

$$('.tab').forEach(tab=>tab.addEventListener('click',()=>{ $$('.tab').forEach(t=>t.classList.remove('active')); tab.classList.add('active'); const key=tab.dataset.tab; $('#optionsPanel').classList.toggle('hidden', key!=='options'); $('#dbPanel').classList.toggle('hidden', key!=='db'); $('#rulesPanel').classList.toggle('hidden', key!=='rules'); syncToolbarByTab(); }));
$$('.table-row-action').forEach(btn=>btn.addEventListener('click',()=>{
  const tableId=btn.dataset.table;
  if(btn.dataset.action==='add') addRowsToTable(tableId, btn.dataset.count || 1);
}));
$('#addOneRowBtn').onclick=()=>{ const t=activeTable(); addRowsToTable(t.id, 1); };
$('#addFiveRowBtn').onclick=()=>{ const t=activeTable(); addRowsToTable(t.id, 5); };
$('#sortModeBtn').onclick=()=>setOptionSortMode(!optionSortMode);
$('#deleteRowBtn').onclick=deleteActiveRow;
$('#clearAllBtn').onclick=clearAllActive;
$$('.head-check').forEach(ch=>ch.addEventListener('change',()=>{
  const tableId=ch.dataset.table;
  ch.indeterminate = false;
  getVisibleRows(tableId).forEach(tr => {
    const rowCheck = tr.querySelector('.row-check');
    if(rowCheck) rowCheck.checked = ch.checked;
  });
  lastCheckedRow = null;
  syncHeaderCheckState(tableId);
}));
$('#clearBtn').onclick=()=>{ const t=activeTable(); const headers=t.headers; const rows=readTable(t.id, headers); setTableData(t.id, headers, rows); resetHeaderCheck(t.id); };
$('#dbUpdateBtn').onclick=updateActiveData;
$('#generateBtn').onclick=generate;
$('#downloadAllBtn').onclick=downloadAll;

initApp();
</script>
